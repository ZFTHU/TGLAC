<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站维护中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .maintenance-container {
      max-width: 600px;
      padding: 40px 20px;
    }
    .maintenance-image-container {
      margin-bottom: 30px;
      display: inline-block;
    }
    .maintenance-image {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .desc {
      font-size: 16px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <div class="maintenance-image-container">
      <img class="maintenance-image" src="/wh/img/image.gif" alt="维护中">
    </div>
    <h1>网站维护中，请稍后访问</h1>
    <p class="desc">
      我们正在对网站进行升级和维护<br>
      给您带来的不便，我们深表歉意<br>
      请稍后再次访问
    </p>
  </div>
</body>
</html>
